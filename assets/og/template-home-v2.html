<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    background:#fafaf7;
    font-family:'JetBrains Mono',monospace;
    color:#0a0a0b;
    position:relative;
  }
  .dots{
    position:absolute;inset:0;
    background-image:radial-gradient(#0a0a0b14 1.5px,transparent 1.5px);
    background-size:28px 28px;
    -webkit-mask-image:radial-gradient(ellipse at 28% 30%, black 35%, transparent 75%);
  }
  .top{position:absolute;left:72px;top:64px;z-index:3}
  .logo{width:38px;height:30px;display:block;margin-bottom:28px}
  .label{
    font-size:16px;text-transform:uppercase;letter-spacing:0.1em;
    color:#7a7770;margin-bottom:30px;
    display:flex;align-items:center;gap:12px;
  }
  .label .pulse{width:9px;height:9px;border-radius:50%;background:#2d8e4a;display:inline-block}
  h1{
    font-family:'Bricolage Grotesque',sans-serif;
    font-weight:400;font-size:78px;line-height:0.98;letter-spacing:-0.03em;
    max-width:11ch;
    color:#0a0a0b;
  }
  h1 em{font-style:normal;color:#5b3df5}
  .site{
    position:absolute;left:72px;bottom:48px;z-index:3;
    font-size:16px;text-transform:uppercase;letter-spacing:0.1em;color:#0a0a0b;
    border-bottom:2px solid #5b3df5;padding-bottom:6px;
  }
  .cards{
    position:absolute;right:-90px;top:300px;width:1010px;height:480px;z-index:2;
  }
  .card{
    position:absolute;width:410px;border-radius:14px;overflow:hidden;
    box-shadow:0 40px 80px -20px #0a0a0b40, 0 0 0 1px #0a0a0b14;
    background:#fff;
  }
  .card img{width:100%;display:block}
  .c1{left:0;top:60px;transform:rotate(-5deg);z-index:1}
  .c2{left:290px;top:0px;transform:rotate(3deg);z-index:2}
  .c3{left:580px;top:50px;transform:rotate(-2deg);z-index:3}
</style>
